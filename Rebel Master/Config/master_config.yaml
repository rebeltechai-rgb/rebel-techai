  ema_bias: true
  allow_missing_features: false

# ======================================================================== #
#  INTELLIGENT SCANNER - Confidence Layer (runs after score gate)
# ======================================================================== #
intelligent_scanner:
  enabled: true
  mode: "ta_only"              # ta_only | hybrid | ai_only (AI off for validation)
  use_ai: false                # Keep AI off during core validation
  min_confidence: 65           # Global minimum confidence (0-100)
  timeframes: ["H1"]          # H1 only — no M5/M15 interference
  bars: 400
  sl_atr_multiplier: 2.0
  tp_atr_multiplier: 3.0

  # Per-family confidence thresholds (override global min_confidence)
  confidence_thresholds:
    fx_major: 65
    fx_minor: 65
    fx_exotic: 70
    metals: 60                 # Historically strong — let more through
    indices: 65
    crypto: 70
    energies: 65
    softs: 65

# 5-gate signal filters (trend, volatility, candle, spread, session)
# Disable during rules-only validation to let score alone decide
signal_filters:
  enabled: false

# Quick toggle: validate core rules only (disables AI/ML in engine)
rules_only: true

# ML trade feature logging (disable to avoid dataset pollution during validation)
ml_feature_logging:
  enabled: false

telegram:
  enabled: false            # set true to enable Telegram alerts
  bot_token: ""             # your Telegram bot token from @BotFather
  chat_id: ""               # your Telegram chat ID

ai:
  enabled: false
  mode: "none"   # base mode for now
  gpt_enabled: false  # master GPT switch
  gpt_observe_at: 750
  gpt_decide_start: 1250
  gpt_decide_end: 1499
  gpt_observe_dual_at: 750
  gpt_model_primary: "gpt-4o-mini"
  gpt_model_secondary: "gpt-4o"
  gpt_secondary_split: 0.20
  gpt_dual_model_start: 1500
  gpt_max_tokens: 200
  gpt_temperature: 0.1
  openai_api_key: ""
  scaling_training_start: 1250

# ======================================================================== #
#  ML TRADE FILTER - Random Forest Model
# ======================================================================== #

ml_filter:
  enabled: false             # enforce ML filter
  model: "rf_v1"              # model to use: rf_v1, rf_v2, rf_v3, rf_v3_production
  min_win_prob: 0.55          # minimum P(win) to allow trade (0.55 = 55%)
  max_loss_prob: 0.70        # reject if P(loss) above this
  log_decisions: true        # log all ML decisions to file

  # Auto-staging by trade count (uses training_dataset.csv)
  staging:
    enabled: false
    stages:
      - name: phase_0_base
        min_trades: 0
        max_trades: 499
        model: "rf_v1"
        min_win_prob: 0.55
        group_threshold: 0.55
      - name: phase_1_validate
        min_trades: 500
        max_trades: 999
        model: "rf_v3_production"
        min_win_prob: 0.60
        group_threshold: 0.60
      - name: phase_2_pre_ai
        min_trades: 1000
        max_trades: 1749
        model: "rf_v3_production"
        min_win_prob: 0.65
        group_threshold: 0.65
      - name: phase_4_dual_model
        min_trades: 1750
        max_trades: 1999
        model: "rf_v3_production"
        min_win_prob: 0.65
        group_threshold: 0.65
      - name: phase_5_full_deploy
        min_trades: 2000
        max_trades: 999999
        model: "rf_v3_production"
        min_win_prob: 0.65
        group_threshold: 0.65
  
  # Per-group ML thresholds
  group_thresholds:
    forex: 0.55
    crypto: 0.55
    indices: 0.55
    metals: 0.55
    energies: 0.55
    softs: 0.55
  
  # NO BYPASS - all asset classes go through same process for consistent data
  bypass_groups: []
  
  # Hard filters (applied on top of ML probability)
  hard_filters:
    max_spread_ratio: 0.005       # fallback if class not specified
    max_spread_ratio_by_class:
      fx: 0.20
      fx_exotic: 0.60
      metals: 0.35
      indices: 0.30
      energies: 0.35
      softs: 0.50
      crypto: 0.60
    max_spread_vol_ratio: 0.25    # spread/volatility guard
    min_reward_risk: 1.2          # minimum R:R ratio
    block_rsi_midzone: false      # block RSI 45-55 chop zone

logging:
  level: INFO
  file: "../Logs/rebel.log"

