
# REBEL MASTER CONFIG - CLEAN BASE

broker:
  type: mt5              # broker connector type: mt5 (more coming soon)

mt5:
  login: 10020166
  password: "Marty123#"                # Fill in your password
  server: "Axi-us50-demo"                  # Fill in your server (e.g., "Axi-Live")
  path: "C:/Rebel Master/terminal64.exe"
scanner:
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - XAUUSD
  timeframe: H1
  history_bars: 200
  min_score: 4

# Skip scanning symbols that never pass filters (saves time)
filter_skip:
  enabled: true
  max_failed_scans: 30
  state_file: "C:/Rebel Technologies/Rebel Master/logs/filter_skip_state.json"

# Auto-purge symbols with consistently poor results
symbol_purge:
  enabled: true
  min_trades: 30
  per_group_min_trades:
    forex: 30
    indices: 40
    metals: 35
  min_losses: 6
  max_win_rate: 0.40
  state_file: "C:/Rebel Technologies/Rebel Master/logs/trade_limiter_state.json"

strategy:
  mode: conservative        # conservative | normal | aggressive
  min_score:
    conservative: 4         # require 4/5 score for conservative mode (loosened for rules-only validation)
    normal: 4               # require 4/5 score for normal mode (was 3)
    aggressive: 3           # require 3/5 score for aggressive mode (was 2)

# Core validation progress (uses closed trades counter)
core_validation:
  enabled: true
  target_trades: 500

trading:
  auto_trade: true         # MASTER SWITCH: set true to enable live trading
  kill_switch: false      # emergency halt (true = no new trades)
  kill_switch_drawdown_percent: 10.0  # auto-halt if drawdown >= 10%
  force_min_lot: true      # force broker minimum (micro units)
  sl_atr_multiplier: 2.0    # stop loss = 2x ATR
  tp_atr_multiplier: 3.0    # take profit = 3x ATR
  max_spread_atr_ratio: 3.0  # spread filter (3.0 recommended, 4.0 safer)
  training_lot_cap: 1.0     # allow crypto to reach broker min lots
  hard_lot_cap: 1.0         # absolute lot ceiling across all symbols

risk:
  max_open_trades: 8
  max_risk_per_trade: 0.01
  max_daily_drawdown: 0.03

safety:
  enabled: true
  max_daily_loss_percent: 2.0   # block trading if daily loss exceeds 2%
  max_trades_per_day: 50        # global max (fallback, per-class limits take priority)
  
  # Per-asset-class daily limits for BALANCED ML training data
  # Total = 18 + 10 + 8 + 7 + 4 + 3 = 50 trades/day max
  # FX+Crypto = 56% | Others = 44% (balanced for ML training)
  asset_class_limits:
    forex: 18       # 36% (largest universe, 74 symbols)
    crypto: 10      # 20% (good liquidity, 24/7)
    metals: 8       # 16% (strong performers)
    indices: 7      # 14% (good diversity)
    energies: 4     # 8% (smaller universe)
    softs: 3        # 6% (limited symbols)

# Trade limiter rules (per-symbol attempts + win-rate floor)
trade_limiter:
  max_attempts_per_symbol: 30
  min_trades_for_win_rate: 30
  min_win_rate: 0.40

# Optional per-family indicator overrides (disabled by default)
indicator_overrides:
