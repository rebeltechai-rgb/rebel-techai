# ======================================================================== #
#  ADVANCED RISK ENGINE – 3% RULE + 30% EXPOSURE LIMIT
# ======================================================================== #

risk_engine:
  enabled: true

  # Per-trade: 3% risk (max loss if SL hit) AND 3% margin per trade
  percent_risk_per_trade: 1.0

  # Optional safety floor/ceiling in account currency
  min_risk_per_trade_currency: 1.0
  max_risk_per_trade_currency: 999999.0

  # MAX TOTAL margin for all open trades: 30% (allows up to 10 trades at 3% each)
  max_equity_exposure_pct: 30.0

# ======================================================================== #
#  PROFIT LOCK SYSTEM – "40 BLUE SHOULD WIN"
# ======================================================================== #

profit_lock:
  enabled: true
  timeframe: H1               # timeframe for ATR calculation
  min_atr: 0.50               # ignore ATR below this (too noisy)
  initial_sl_atr: 2.0         # initial SL distance in ATR (for R calc)

  tiers:
    # Tier 1: when trade is +1 ATR → move SL to just better than BE
    - trigger_atr: 1.0
      lock_distance_atr: 1.2  # SL ≈ entry + small cushion
      min_lock_rr: 0.1        # lock at least +0.1R if possible

    # Tier 2: when trade is +1.5 ATR → start locking real profit
    - trigger_atr: 1.5
      lock_distance_atr: 0.9
      min_lock_rr: 0.4

    # Tier 3: when trade is +2 ATR → trail tighter
    - trigger_atr: 2.0
      lock_distance_atr: 0.7
      min_lock_rr: 0.8

    # Tier 4: when trade is +2.5 ATR → lock aggressively
    - trigger_atr: 2.5
      lock_distance_atr: 0.5
      min_lock_rr: 1.2

