<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBEL Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --bg-hover: #243044;
            --accent: #10b981;
            --accent-dim: #059669;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2d3a4f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 9999px;
            font-size: 0.875rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-primary);
        }

        .card-value.accent {
            color: var(--accent);
        }

        .card-value.danger {
            color: var(--danger);
        }

        .card-value.warning {
            color: var(--warning);
        }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .config-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
        }

        .config-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .config-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-primary);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 0.75rem;
        }

        .toggle-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .toggle {
            position: relative;
            width: 52px;
            height: 28px;
            background: var(--bg-hover);
            border-radius: 9999px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.active {
            background: var(--accent);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle.active::after {
            transform: translateX(24px);
        }

        .symbol-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .symbol-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .symbol-tag .remove {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .symbol-tag .remove:hover {
            color: var(--danger);
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        input[type="text"], select {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-dim);
            transform: translateY(-1px);
        }

        button.secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        button.danger {
            background: var(--danger);
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: var(--accent);
        }

        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .log-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }

        .log-line {
            padding: 0.25rem 0;
            color: var(--text-secondary);
        }

        .log-line.info { color: var(--accent); }
        .log-line.warn { color: var(--warning); }
        .log-line.error { color: var(--danger); }

        .refresh-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">R</div>
                <h1>REBEL <span>Dashboard</span></h1>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">Loading...</span>
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Strategy Mode</span>
                </div>
                <div class="card-value accent" id="strategy-mode">--</div>
                <div class="mode-selector">
                    <button class="mode-btn" data-mode="conservative">Conservative</button>
                    <button class="mode-btn" data-mode="normal">Normal</button>
                    <button class="mode-btn" data-mode="aggressive">Aggressive</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Auto Trading</span>
                </div>
                <div class="card-value" id="auto-trade-status">--</div>
                <div class="toggle-container" style="margin-top: 1rem; background: transparent; padding: 0;">
                    <span class="toggle-label">Enable Live Trading</span>
                    <div class="toggle" id="auto-trade-toggle"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Risk Per Trade</span>
                </div>
                <div class="card-value" id="risk-percent">--</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="card-title">Max Daily Loss</span>
                </div>
                <div class="card-value danger" id="max-loss">--</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">⚙️ Configuration</div>
            <div class="config-grid" id="config-display">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="section">
            <div class="section-title">📊 Trading Symbols</div>
            <div class="symbol-list" id="symbol-list">
                <!-- Populated by JS -->
            </div>
            <div class="input-group">
                <input type="text" id="new-symbol" placeholder="Enter symbol (e.g., EURUSD)">
                <button onclick="addSymbol()">Add Symbol</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">📋 Safety Settings</div>
            <div class="toggle-container">
                <span class="toggle-label">Safety Enabled</span>
                <div class="toggle" id="safety-toggle"></div>
            </div>
            <div class="config-grid">
                <div class="config-item">
                    <div class="config-label">Max Trades Per Day</div>
                    <div class="config-value" id="max-trades-day">--</div>
                </div>
                <div class="config-item">
                    <div class="config-label">Max Daily Loss %</div>
                    <div class="config-value" id="max-daily-loss">--</div>
                </div>
                <div class="config-item">
                    <div class="config-label">SL Multiplier (ATR)</div>
                    <div class="config-value" id="sl-multiplier">--</div>
                </div>
                <div class="config-item">
                    <div class="config-label">TP Multiplier (ATR)</div>
                    <div class="config-value" id="tp-multiplier">--</div>
                </div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="loadAll()">↻</button>

    <script>
        let config = {};
        let symbols = {};

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                config = await res.json();
                updateConfigDisplay();
            } catch (e) {
                console.error('Failed to load config:', e);
            }
        }

        async function loadSymbols() {
            try {
                const res = await fetch('/api/symbols');
                symbols = await res.json();
                updateSymbolDisplay();
            } catch (e) {
                console.error('Failed to load symbols:', e);
            }
        }

        function updateConfigDisplay() {
            // Strategy mode
            const mode = config.strategy?.mode || 'normal';
            document.getElementById('strategy-mode').textContent = mode.toUpperCase();
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });

            // Auto trade
            const autoTrade = config.trading?.auto_trade || false;
            document.getElementById('auto-trade-status').textContent = autoTrade ? 'ENABLED' : 'DISABLED';
            document.getElementById('auto-trade-status').className = 'card-value ' + (autoTrade ? 'accent' : 'danger');
            document.getElementById('auto-trade-toggle').classList.toggle('active', autoTrade);

            // Risk
            const risk = config.trading?.lot_risk_percent || 0.01;
            document.getElementById('risk-percent').textContent = (risk * 100).toFixed(1) + '%';

            // Max loss
            const maxLoss = config.safety?.max_daily_loss_percent || 3.0;
            document.getElementById('max-loss').textContent = maxLoss.toFixed(1) + '%';

            // Safety toggle
            const safetyEnabled = config.safety?.enabled !== false;
            document.getElementById('safety-toggle').classList.toggle('active', safetyEnabled);

            // Safety settings
            document.getElementById('max-trades-day').textContent = config.safety?.max_trades_per_day || 10;
            document.getElementById('max-daily-loss').textContent = (config.safety?.max_daily_loss_percent || 3.0) + '%';
            document.getElementById('sl-multiplier').textContent = (config.trading?.sl_atr_multiplier || 2.0) + 'x';
            document.getElementById('tp-multiplier').textContent = (config.trading?.tp_atr_multiplier || 3.0) + 'x';

            // Status
            document.getElementById('status-text').textContent = autoTrade ? 'Trading Active' : 'Monitoring Only';
        }

        function updateSymbolDisplay() {
            const container = document.getElementById('symbol-list');
            container.innerHTML = '';
            
            const groups = symbols.groups || {};
            for (const [group, syms] of Object.entries(groups)) {
                if (Array.isArray(syms)) {
                    syms.forEach(sym => {
                        const tag = document.createElement('div');
                        tag.className = 'symbol-tag';
                        tag.innerHTML = `
                            <span>${sym}</span>
                            <span class="remove" onclick="removeSymbol('${sym}')">&times;</span>
                        `;
                        container.appendChild(tag);
                    });
                }
            }
        }

        async function updateConfig(updates) {
            try {
                const res = await fetch('/api/config/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });
                const data = await res.json();
                if (data.ok) {
                    await loadConfig();
                }
            } catch (e) {
                console.error('Failed to update config:', e);
            }
        }

        async function addSymbol() {
            const input = document.getElementById('new-symbol');
            const symbol = input.value.trim().toUpperCase();
            if (!symbol) return;

            try {
                const res = await fetch('/api/symbols/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol })
                });
                const data = await res.json();
                if (data.ok) {
                    input.value = '';
                    await loadSymbols();
                }
            } catch (e) {
                console.error('Failed to add symbol:', e);
            }
        }

        async function removeSymbol(symbol) {
            try {
                const res = await fetch('/api/symbols/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol })
                });
                const data = await res.json();
                if (data.ok) {
                    await loadSymbols();
                }
            } catch (e) {
                console.error('Failed to remove symbol:', e);
            }
        }

        // Event listeners
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                updateConfig({ strategy: { ...config.strategy, mode } });
            });
        });

        document.getElementById('auto-trade-toggle').addEventListener('click', () => {
            const current = config.trading?.auto_trade || false;
            updateConfig({ trading: { ...config.trading, auto_trade: !current } });
        });

        document.getElementById('safety-toggle').addEventListener('click', () => {
            const current = config.safety?.enabled !== false;
            updateConfig({ safety: { ...config.safety, enabled: !current } });
        });

        document.getElementById('new-symbol').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addSymbol();
        });

        function loadAll() {
            loadConfig();
            loadSymbols();
        }

        // Initial load
        loadAll();

        // Auto refresh every 30 seconds
        setInterval(loadAll, 30000);
    </script>
</body>
</html>
